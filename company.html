<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Company — 13X Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F4EE;
  --bg2:#EFECE5;
  --bg3:#E8E4DA;
  --text:#0F0F0F;
  --text2:#4A4A4A;
  --text3:#9A9A9A;
  --border:#DDD9CF;
  --border2:#C8C4BA;
  --green:#1A7A4A;
  --green-bg:#E8F5EE;
  --red:#C0392B;
  --red-bg:#FDE8E6;
  --blue:#1A4FA0;
  --blue-bg:#E8EEFA;
  --amber:#8B6914;
  --amber-bg:#FEF3D7;
  --purple:#6B21A8;
  --purple-bg:#F3E8FF;
  --card:#FFFFFF;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:'DM Sans',sans-serif}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(247,244,238,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;gap:12px}
.nav-left{display:flex;align-items:center;gap:14px;min-width:0}
.nav-logo{font-family:'Instrument Serif',serif;font-size:19px;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:-0.3px}
.nav-logo em{font-style:italic;color:var(--text3)}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);transition:all .15s;white-space:nowrap;flex-shrink:0}
.nav-back:hover{color:var(--text);border-color:var(--border2);background:var(--bg2)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-user-name{font-size:12px;color:var(--text2);font-weight:500}
.nav-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green)}
.nav-badge.free{background:var(--amber-bg);color:var(--amber)}

/* LAYOUT */
.page-wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px}

/* COMPANY HEADER */
.co-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);margin-bottom:18px}
.co-breadcrumb a{cursor:pointer;transition:color .15s}
.co-breadcrumb a:hover{color:var(--text)}
.co-breadcrumb .sep{color:var(--border2)}

.co-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.co-name{font-family:'Instrument Serif',serif;font-size:clamp(26px,5vw,40px);font-weight:400;letter-spacing:-0.5px;line-height:1.1;margin-bottom:5px}
.co-ticker{font-family:'Geist Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:0.8px;margin-bottom:10px}
.co-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.pill.industry{background:var(--bg2);color:var(--text2)}
.pill.stage-early_growth{background:var(--green-bg);color:var(--green);border-color:transparent}
.pill.stage-acceleration{background:var(--blue-bg);color:var(--blue);border-color:transparent}
.pill.stage-maturity{background:var(--amber-bg);color:var(--amber);border-color:transparent}
.pill.stage-decline{background:var(--red-bg);color:var(--red);border-color:transparent}
.pill.cap{background:var(--bg2);color:var(--text3)}

.co-score-row{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.score-pips{display:flex;gap:3px}
.pip{width:9px;height:9px;border-radius:50%;background:var(--bg3);border:1px solid var(--border)}
.pip.on{background:var(--text);border-color:var(--text)}
.score-text{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace}

.co-actions{display:flex;gap:8px;align-items:flex-start;flex-shrink:0;padding-top:4px}
.btn-watch{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:var(--shadow)}
.btn-watch:hover{border-color:var(--text);background:var(--bg2)}
.btn-watch.active{background:var(--text);color:#fff;border-color:var(--text);box-shadow:none}
.btn-watch:disabled{opacity:.5;cursor:not-allowed}

/* CATALYST TAGS */
.cat-badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600}
.cat-badge.capex{background:var(--blue-bg);color:var(--blue)}
.cat-badge.margin{background:var(--green-bg);color:var(--green)}
.cat-badge.geo{background:var(--amber-bg);color:var(--amber)}
.cat-badge.new-prod{background:var(--purple-bg);color:var(--purple)}
.cat-badge.acq{background:var(--red-bg);color:var(--red)}

/* TOP TRIGGER BANNER */
.top-trigger-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow)}
.tt-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;margin-top:3px;flex-shrink:0}
.tt-text{font-size:14px;color:var(--text);line-height:1.6}

/* TABS */
.tabs-wrap{border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:700}
.tab-count{font-size:10px;color:var(--text3);background:var(--bg2);padding:1px 6px;border-radius:10px;margin-left:4px;font-family:'Geist Mono',monospace}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.section-count{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:10px;font-family:'Geist Mono',monospace}

/* OVERVIEW */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:19px;font-weight:700;letter-spacing:-0.3px;font-family:'Instrument Serif',serif;line-height:1.2}
.stat-value.sm{font-size:14px;font-family:'DM Sans';font-weight:600;letter-spacing:0}
.catalyst-row{display:flex;flex-wrap:wrap;gap:5px}

/* TRIGGER CARDS */
.trigger-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);transition:border-color .15s}
.trigger-card:hover{border-color:var(--border2)}
.trigger-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.trigger-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.conviction{display:flex;gap:3px}
.c-dot{width:7px;height:7px;border-radius:50%;background:var(--bg3);border:1px solid var(--border)}
.c-dot.on{background:var(--text);border-color:var(--text)}
.conv-text{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace}
.q-chip{font-size:10px;color:var(--text3);background:var(--bg2);padding:2px 7px;border-radius:4px;font-family:'Geist Mono',monospace;border:1px solid var(--border)}
.trigger-body{font-size:14px;color:var(--text);line-height:1.7}
.trigger-quote-block{margin-top:12px;padding:10px 14px;background:var(--bg);border-radius:6px;border-left:3px solid var(--border2)}
.trigger-quote-block p{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic}

/* SIGNAL CARDS */
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);transition:border-color .15s}
.signal-card:hover{border-color:var(--border2)}
.signal-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.sig-type{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.sig-type.guidance{background:var(--blue-bg);color:var(--blue)}
.sig-type.capex{background:var(--green-bg);color:var(--green)}
.sig-type.margin{background:var(--amber-bg);color:var(--amber)}
.sig-type.expansion{background:var(--purple-bg);color:var(--purple)}
.sig-type.acquisition{background:var(--red-bg);color:var(--red)}
.sig-type.risk{background:var(--red-bg);color:var(--red)}
.sig-right{display:flex;align-items:center;gap:7px}
.conf-dots{display:flex;gap:2px}
.conf-dot{font-size:9px;color:var(--border2)}
.conf-dot.on{color:var(--text)}
.signal-body{font-size:14px;color:var(--text);line-height:1.7}
.signal-src{font-size:11px;color:var(--text3);margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}

/* CONCALL */
.snapshot-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}
.metric-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.metric-val{font-size:20px;font-family:'Instrument Serif',serif}
.metric-val.up{color:var(--green)}
.metric-val.down{color:var(--red)}
.metric-val.stable{color:var(--amber)}
.tone-chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.tone-chip.positive{background:var(--green-bg);color:var(--green)}
.tone-chip.neutral{background:var(--amber-bg);color:var(--amber)}
.tone-chip.cautious{background:var(--red-bg);color:var(--red)}

.concall-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.cb-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cb-body{font-size:14px;color:var(--text);line-height:1.75}

.key-quotes{display:flex;flex-direction:column}
.quote-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.quote-row:last-child{border-bottom:none;padding-bottom:0}
.quote-accent{width:3px;min-height:30px;border-radius:2px;background:var(--border2);flex-shrink:0}
.quote-text{font-size:13px;color:var(--text);line-height:1.65;font-style:italic;margin-bottom:4px}
.quote-attr{font-size:11px;color:var(--text3)}

/* EMPTY / LOADING / PAYWALL */
.empty{text-align:center;padding:56px 20px}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;color:var(--text3);line-height:1.6}
.loading-wrap{text-align:center;padding:80px 20px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.paywall-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:52px 32px;text-align:center;margin:40px 0;box-shadow:var(--shadow-md)}
.paywall-icon{font-size:40px;margin-bottom:16px}
.paywall-wrap h3{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;margin-bottom:8px;letter-spacing:-0.3px}
.paywall-wrap p{font-size:14px;color:var(--text2);margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.65}
.paywall-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--text);color:#fff;border:none;padding:10px 22px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);padding:9px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-outline:hover{border-color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;background:var(--text);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none;max-width:calc(100vw - 40px)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

/* RESPONSIVE */
@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .snapshot-metrics{grid-template-columns:1fr 1fr}
  .co-top{flex-direction:column}
  .co-actions{padding-top:0}
}
@media(max-width:480px){
  .page-wrap{padding:16px 14px 70px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .snapshot-metrics{grid-template-columns:1fr 1fr}
  .nav-user-name{display:none}
  .tab-btn{padding:8px 12px;font-size:12px}
  .co-name{font-size:26px}
}
@media(max-width:360px){
  .stats-grid{grid-template-columns:1fr}
  .snapshot-metrics{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo" onclick="goHome()">13X <em>Investments</em></div>
    <button class="nav-back" onclick="goBack()">← Screener</button>
  </div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>

<div class="page-wrap">
  <div id="main-content">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://one3x-backend.onrender.com/api/v1';

// State
let currentUser = null, currentSub = null, isPaid = false;
let companyData = null, watchlisted = false;

// Auth
const getToken        = () => localStorage.getItem('13x_token');
const getRefreshToken = () => localStorage.getItem('13x_refresh_token');
const setToken        = t  => localStorage.setItem('13x_token', t);
const setRefreshToken = t  => localStorage.setItem('13x_refresh_token', t);
const removeToken     = () => localStorage.removeItem('13x_token');
const removeRefreshToken = () => localStorage.removeItem('13x_refresh_token');

let _refreshing = false;
async function tryRefreshToken() {
  if (_refreshing) return false;
  const rt = getRefreshToken();
  if (!rt) return false;
  _refreshing = true;
  try {
    const res  = await fetch(API_BASE + '/auth/refresh', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:rt})});
    const data = await res.json();
    if (!res.ok) throw new Error();
    setToken(data.accessToken);
    if (data.refreshToken) setRefreshToken(data.refreshToken);
    return true;
  } catch { return false; }
  finally { _refreshing = false; }
}

async function apiFetch(path, options={}, _retry=true) {
  const token = getToken();
  const headers = {'Content-Type':'application/json',...(options.headers||{})};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, {...options, headers});
  if (res.status === 401 && _retry) {
    const ok = await tryRefreshToken();
    if (ok) return apiFetch(path, options, false);
    removeToken(); removeRefreshToken();
    window.location.href = '/';
    throw new Error('Session expired');
  }
  let data; try { data = await res.json(); } catch { data = {}; }
  if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
  return data;
}

// Utils
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function goHome(){window.location.href='/';}
function goBack(){
  if (document.referrer && document.referrer.includes(location.hostname)) history.back();
  else window.location.href = '/';
}
function getTickerFromURL(){
  const p = window.location.pathname.split('/').filter(Boolean);
  return p[p.length-1] || null;
}
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.className='toast', 3000);
}

// Nav
function renderNav(){
  const area = document.getElementById('nav-user-area');
  if (!currentUser){area.innerHTML='';return;}
  const pl = isPaid ? (currentSub?.plan==='yearly'?'Pro Yearly':currentSub?.plan==='trial'?'Trial':'Pro') : 'Free';
  area.innerHTML = `<span class="nav-user-name">${esc(currentUser.name.split(' ')[0])}</span><span class="nav-badge ${isPaid?'':'free'}">${esc(pl)}</span>`;
}

// Tab switching
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display = p.id==='panel-'+tab ? '' : 'none');
}

// Watchlist
async function toggleWatchlist(){
  if (!companyData) return;
  const btn = document.getElementById('btn-watch');
  btn.disabled = true;
  try {
    if (watchlisted){
      await apiFetch('/data/watchlist/'+companyData.id,{method:'DELETE'});
      watchlisted = false;
      btn.innerHTML = '☆ Watchlist';
      btn.classList.remove('active');
      showToast('Removed from watchlist');
    } else {
      await apiFetch('/data/watchlist/'+companyData.id,{method:'POST'});
      watchlisted = true;
      btn.innerHTML = '⭐ Watchlisted';
      btn.classList.add('active');
      showToast('Added to watchlist','success');
    }
  } catch(err){showToast(err.message||'Failed','error');}
  finally{btn.disabled=false;}
}

// Helpers
function trendCls(v){
  if(!v) return '';
  const u=v.toLowerCase();
  if(['up','improving','growing'].includes(u)) return 'up';
  if(['down','declining','falling'].includes(u)) return 'down';
  return 'stable';
}
function trendIcon(v){
  const c=trendCls(v);
  if(c==='up') return '↑';
  if(c==='down') return '↓';
  return '→';
}
function scorePipsHTML(n,total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<span class="pip${i<=n?' on':''}"></span>`;
  return `<div class="score-pips">${h}</div>`;
}
function convDots(n,total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<span class="c-dot${i<=n?' on':''}"></span>`;
  return `<div class="conviction">${h}</div>`;
}
function confDotsHTML(n,total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<span class="conf-dot${i<=n?' on':''}">●</span>`;
  return `<div class="conf-dots">${h}</div>`;
}
function catLabel(t){
  return t.replace('new-prod','New Product').replace('geo','Geo Expansion').replace('acq','Acquisition').replace('margin','Margin Exp.').replace('capex','Capex');
}
function stageLabel(s){
  return {early_growth:'Early Growth',acceleration:'Acceleration',maturity:'Maturity',decline:'Decline'}[s]||s;
}

// ── Overview tab ──────────────────────────────────────────────
function buildOverview(co){
  const cats = (co.catalyst_tags||[]).map(t=>`<span class="cat-badge ${esc(t)}">${catLabel(t)}</span>`).join('');
  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Score</div>
        <div class="stat-value">${co.score||0}<span style="font-size:13px;color:var(--text3);font-family:'DM Sans'">/5</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Stage</div>
        <div class="stat-value sm">${co.stage ? stageLabel(co.stage) : '—'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Market Cap</div>
        <div class="stat-value sm">${co.market_cap ? esc(co.market_cap)+' Cap' : '—'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Industry</div>
        <div class="stat-value sm" style="font-size:12px">${esc(co.industry||'—')}</div>
      </div>
    </div>
    ${cats ? `<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Catalyst Tags</div><div class="catalyst-row">${cats}</div></div>` : ''}
    ${co.top_trigger ? `
    <div class="concall-block">
      <div class="cb-title">⚡ Top Growth Trigger</div>
      <div class="cb-body">${esc(co.top_trigger)}</div>
    </div>` : ''}
    <div style="margin-top:4px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-outline" style="font-size:12px" onclick="switchTab('triggers')">All triggers →</button>
      <button class="btn-outline" style="font-size:12px" onclick="switchTab('signals')">Management signals →</button>
      <button class="btn-outline" style="font-size:12px" onclick="switchTab('concall')">Concall snapshot →</button>
    </div>`;
}

// ── Signals tab ───────────────────────────────────────────────
function buildSignals(signals){
  if(!signals||!signals.length) return `<div class="empty"><div class="empty-icon">📡</div><p>No management signals available for this company yet.</p></div>`;
  let html = `<div class="section-hdr"><span class="section-title">Management Signals <span class="section-count">${signals.length}</span></span></div>`;
  signals.forEach(s=>{
    html += `
    <div class="signal-card">
      <div class="signal-card-top">
        <span class="sig-type ${esc(s.signal_type||'guidance')}">${esc(s.signal_type||'guidance')}</span>
        <div class="sig-right">
          ${confDotsHTML(s.confidence||0)}
          ${s.quarter?`<span class="q-chip">${esc(s.quarter)}</span>`:''}
        </div>
      </div>
      <div class="signal-body">${esc(s.content)}</div>
      ${s.source?`<div class="signal-src">${esc(s.source)}</div>`:''}
    </div>`;
  });
  return html;
}

// ── Triggers tab ──────────────────────────────────────────────
function buildTriggers(triggers){
  if(!triggers||!triggers.length) return `<div class="empty"><div class="empty-icon">⚡</div><p>No growth triggers available for this company yet.</p></div>`;
  let html = `<div class="section-hdr"><span class="section-title">Growth Triggers <span class="section-count">${triggers.length}</span></span></div>`;
  triggers.forEach(t=>{
    html += `
    <div class="trigger-card">
      <div class="trigger-card-top">
        <div class="trigger-meta">
          ${convDots(t.conviction_score||0)}
          <span class="conv-text">${t.conviction_score||0}/5</span>
          ${t.catalyst_type?`<span class="cat-badge ${esc(t.catalyst_type)}">${catLabel(t.catalyst_type)}</span>`:''}
        </div>
        ${t.quarter?`<span class="q-chip">${esc(t.quarter)}</span>`:''}
      </div>
      <div class="trigger-body">${esc(t.trigger_text)}</div>
      ${t.source_quote?`<div class="trigger-quote-block"><p>"${esc(t.source_quote)}"</p></div>`:''}
    </div>`;
  });
  return html;
}

// ── Concall tab ───────────────────────────────────────────────
function buildConcall(snapshot){
  if(!snapshot) return `<div class="empty"><div class="empty-icon">📋</div><p>No concall snapshot available for this company yet.</p></div>`;
  const tc = trendCls(snapshot.revenue_trend);
  const mc = trendCls(snapshot.margin_trend);
  const toneC = (snapshot.tone||'neutral').toLowerCase();

  let html = `
    <div class="snapshot-metrics">
      <div class="metric-card">
        <div class="metric-label">Revenue</div>
        <div class="metric-val ${tc}">${trendIcon(snapshot.revenue_trend)} ${esc(snapshot.revenue_trend||'—')}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Margins</div>
        <div class="metric-val ${mc}">${trendIcon(snapshot.margin_trend)} ${esc(snapshot.margin_trend||'—')}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Mgmt Tone</div>
        <span class="tone-chip ${toneC}">${esc(snapshot.tone||'Neutral')}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">Quarter</div>
        <div class="metric-val" style="font-size:15px;font-family:'Geist Mono',monospace">${esc(snapshot.quarter||'—')}</div>
      </div>
    </div>`;

  if(snapshot.guidance_summary){
    html += `<div class="concall-block"><div class="cb-title">🎯 Management Guidance</div><div class="cb-body">${esc(snapshot.guidance_summary)}</div></div>`;
  }
  if(snapshot.capex_commentary){
    html += `<div class="concall-block"><div class="cb-title">🏗️ Capex Commentary</div><div class="cb-body">${esc(snapshot.capex_commentary)}</div></div>`;
  }
  if(snapshot.risks){
    html += `<div class="concall-block"><div class="cb-title">⚠️ Risks Highlighted</div><div class="cb-body">${esc(snapshot.risks)}</div></div>`;
  }
  if(snapshot.key_quotes && snapshot.key_quotes.length){
    const qHTML = snapshot.key_quotes.map(q=>`
      <div class="quote-row">
        <div class="quote-accent"></div>
        <div>
          <div class="quote-text">"${esc(q.text)}"</div>
          ${(q.speaker||q.quarter)?`<div class="quote-attr">${[q.speaker,q.quarter].filter(Boolean).map(esc).join(' · ')}</div>`:''}
        </div>
      </div>`).join('');
    html += `<div class="concall-block"><div class="cb-title">📞 Key Management Quotes</div><div class="key-quotes">${qHTML}</div></div>`;
  }
  return html;
}

// ── Main render ───────────────────────────────────────────────
function renderPage(co, triggers, signals, snapshot){
  const cats = (co.catalyst_tags||[]).map(t=>`<span class="cat-badge ${esc(t)}">${catLabel(t)}</span>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="co-breadcrumb">
      <a onclick="goHome()">Home</a><span class="sep">/</span>
      <a onclick="goBack()">Screener</a><span class="sep">/</span>
      <span>${esc(co.name)}</span>
    </div>

    <div class="co-top">
      <div>
        <h1 class="co-name">${esc(co.name)}</h1>
        ${co.ticker?`<div class="co-ticker">${esc(co.ticker)}</div>`:''}
        <div class="co-pills">
          ${co.industry?`<span class="pill industry">${esc(co.industry)}</span>`:''}
          ${co.stage?`<span class="pill stage-${co.stage}">${stageLabel(co.stage)}</span>`:''}
          ${co.market_cap?`<span class="pill cap">${esc(co.market_cap)} Cap</span>`:''}
        </div>
        <div class="co-score-row">
          ${scorePipsHTML(co.score||0)}
          <span class="score-text">${co.score||0}/5</span>
        </div>
        ${cats?`<div class="catalyst-row" style="margin-top:8px">${cats}</div>`:''}
      </div>
      <div class="co-actions">
        <button id="btn-watch" class="btn-watch ${watchlisted?'active':''}" onclick="toggleWatchlist()">
          ${watchlisted?'⭐ Watchlisted':'☆ Watchlist'}
        </button>
      </div>
    </div>

    ${co.top_trigger?`
    <div class="top-trigger-bar">
      <span class="tt-label">Top Trigger</span>
      <span class="tt-text">${esc(co.top_trigger)}</span>
    </div>`:''}

    <div class="tabs-wrap">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" data-tab="triggers" onclick="switchTab('triggers')">Triggers<span class="tab-count">${triggers.length}</span></button>
      <button class="tab-btn" data-tab="signals" onclick="switchTab('signals')">Signals<span class="tab-count">${signals.length}</span></button>
      <button class="tab-btn" data-tab="concall" onclick="switchTab('concall')">Concall</button>
    </div>

    <div id="panel-overview" class="tab-panel">${buildOverview(co)}</div>
    <div id="panel-triggers" class="tab-panel" style="display:none">${buildTriggers(triggers)}</div>
    <div id="panel-signals"  class="tab-panel" style="display:none">${buildSignals(signals)}</div>
    <div id="panel-concall"  class="tab-panel" style="display:none">${buildConcall(snapshot)}</div>
  `;
}

function renderPaywall(){
  document.getElementById('main-content').innerHTML = `
    <div class="paywall-wrap">
      <div class="paywall-icon">🔒</div>
      <h3>Subscribe to View Company Details</h3>
      <p>Get full access to concall snapshots, management signals, and growth triggers for 2000+ Indian companies.</p>
      <div class="paywall-btns">
        <button class="btn-primary" onclick="goHome()">See Plans →</button>
        <button class="btn-outline" onclick="goHome()">Sign In</button>
      </div>
    </div>`;
}

function renderError(msg){
  document.getElementById('main-content').innerHTML = `
    <div class="empty" style="padding-top:80px">
      <div class="empty-icon">⚠️</div>
      <p style="margin-bottom:20px">${esc(msg)}</p>
      <button class="btn-primary" onclick="goBack()">Go Back</button>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────
async function init(){
  const ticker = getTickerFromURL();
  if(!ticker || ticker==='company'){renderError('Company not found.');return;}

  const token = getToken();
  if(token){
    try{
      const me = await apiFetch('/auth/me');
      currentUser = me.user;
      currentSub  = me.subscription;
      isPaid      = me.isPaid;
    } catch{}
  }

  renderNav();
  if(!isPaid){renderPaywall();return;}

  try{
    const [coRes,triggersRes,signalsRes,snapshotRes,watchlistRes] = await Promise.allSettled([
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/triggers'),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/signals'),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/snapshot'),
      apiFetch('/data/watchlist'),
    ]);

    if(coRes.status==='rejected'){renderError('Company not found: '+ticker);return;}

    companyData = coRes.value.data;
    document.title = companyData.name + ' — 13X Investments';

    const triggers = triggersRes.status==='fulfilled' ? (triggersRes.value.data||[]) : [];
    const signals  = signalsRes.status ==='fulfilled' ? (signalsRes.value.data ||[]) : [];
    const snapshot = snapshotRes.status==='fulfilled' ? snapshotRes.value.data   : null;

    if(watchlistRes.status==='fulfilled'){
      const wids = new Set((watchlistRes.value.data||[]).map(c=>c.id));
      watchlisted = wids.has(companyData.id);
    }

    renderPage(companyData, triggers, signals, snapshot);
  } catch(err){
    renderError(err.message||'Failed to load company.');
  }
}

init();
</script>
</body>
</html>
