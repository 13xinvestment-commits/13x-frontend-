<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Company — 13X Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#0D4A2F;
  --green-mid:#155C3A;
  --green-light:#1A7A4A;
  --green-pale:#E8F5EE;
  --green-mist:#F0F9F4;
  --sage:#4A7C5F;
  --white:#FFFFFF;
  --off:#FAFAF8;
  --bg:#F6F6F3;
  --text:#0A0A0A;
  --text2:#3D3D3D;
  --text3:#7A7A7A;
  --text4:#B0B0B0;
  --border:#E2E2DE;
  --border2:#D0D0CA;
  --gold:#B8860B;
  --gold-bg:#FEF3D7;
  --red:#B91C1C;
  --red-bg:#FEE2E2;
  --blue:#1D4ED8;
  --blue-bg:#EFF6FF;
  --purple:#7C3AED;
  --purple-bg:#F5F3FF;
  --card:#FFFFFF;
  --radius:6px;
  --radius-lg:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth}
body{
  font-family:'Sora',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font-family:'Sora',sans-serif;cursor:pointer}

/* ══════════ NAV ══════════ */
nav{
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:56px;
  display:flex;align-items:center;
  padding:0 24px;gap:14px;
}
.nav-logo{
  display:flex;align-items:center;gap:9px;
  cursor:pointer;flex-shrink:0;
  text-decoration:none;
}
.nav-logo-mark{
  width:30px;height:30px;
  background:var(--green);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:14px;font-weight:700;color:#fff;
}
.nav-logo-text{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;color:var(--text);
  letter-spacing:-0.3px;
}
.nav-logo-text em{font-style:italic;color:var(--green);font-weight:400}
.nav-sep{
  width:1px;height:20px;background:var(--border);flex-shrink:0;
}
.nav-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;color:var(--text3);
  background:none;border:1px solid var(--border);
  padding:5px 12px;border-radius:5px;
  transition:all .15s;white-space:nowrap;
}
.nav-back:hover{color:var(--green);border-color:var(--green)}
.nav-breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text3);
  overflow:hidden;min-width:0;
}
.nav-breadcrumb span{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:200px;
}
.nav-breadcrumb .sep{color:var(--text4);flex-shrink:0}
.nav-right{
  display:flex;align-items:center;gap:8px;
  margin-left:auto;flex-shrink:0;
}
.nav-badge{
  font-size:11px;font-weight:600;padding:2px 9px;
  border-radius:20px;background:var(--green-pale);color:var(--green);
}
.nav-badge.free{background:var(--gold-bg);color:var(--gold)}
.nav-user{font-size:12px;font-weight:500;color:var(--text2)}

/* ══════════ LAYOUT ══════════ */
.page-wrap{
  max-width:960px;margin:0 auto;
  padding:28px 20px 80px;
}

/* ══════════ COMPANY HEADER ══════════ */
.co-header{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:28px 28px 24px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.co-header-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:16px;
  flex-wrap:wrap;margin-bottom:20px;
}
.co-meta{}
.co-industry-chip{
  display:inline-block;
  font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--green);background:var(--green-pale);
  border-radius:4px;padding:3px 9px;margin-bottom:10px;
}
.co-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,42px);
  font-weight:700;line-height:1.08;
  letter-spacing:-0.8px;
  color:var(--text);margin-bottom:8px;
}
.co-ticker{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text3);
  letter-spacing:1px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.co-ticker-val{
  background:var(--bg);border:1px solid var(--border);
  border-radius:4px;padding:2px 8px;
}
.co-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--bg);color:var(--text2);
}
.pill.stage-early_growth{background:var(--green-pale);color:var(--green);border-color:transparent}
.pill.stage-acceleration{background:var(--blue-bg);color:var(--blue);border-color:transparent}
.pill.stage-maturity{background:var(--gold-bg);color:var(--gold);border-color:transparent}
.pill.stage-decline{background:var(--red-bg);color:var(--red);border-color:transparent}

/* SCORE DISPLAY */
.co-score-block{
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  flex-shrink:0;
}
.score-num{
  font-family:'Playfair Display',serif;
  font-size:52px;font-weight:700;
  color:var(--green);line-height:1;
  letter-spacing:-2px;
}
.score-denom{
  font-size:18px;color:var(--text3);
  font-family:'Sora',sans-serif;font-weight:400;
}
.score-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  text-align:right;
}
.score-pips{display:flex;gap:4px;justify-content:flex-end}
.pip{
  width:10px;height:10px;border-radius:50%;
  background:var(--border);border:1px solid var(--border2);
}
.pip.on{background:var(--green);border-color:var(--green)}

/* WATCHLIST BTN */
.btn-watch{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:6px;
  border:1.5px solid var(--border2);
  background:#fff;color:var(--text2);
  font-size:13px;font-weight:600;
  transition:all .2s;box-shadow:var(--shadow);
}
.btn-watch:hover{border-color:var(--green);color:var(--green)}
.btn-watch.active{background:var(--green);color:#fff;border-color:var(--green)}
.btn-watch:disabled{opacity:.5;cursor:not-allowed}

/* ══════════ TOP TRIGGER BANNER ══════════ */
.top-trigger-banner{
  background:var(--green);
  border-radius:var(--radius-lg);
  padding:16px 20px;
  margin-bottom:20px;
  display:flex;gap:14px;align-items:flex-start;
}
.tt-eyebrow{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(255,255,255,.55);
  white-space:nowrap;margin-top:3px;flex-shrink:0;
}
.tt-text{
  font-size:14px;color:#fff;line-height:1.6;font-weight:500;
}

/* ══════════ STATS ROW ══════════ */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:20px;
}
.stat-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;
  box-shadow:var(--shadow);
}
.stat-label{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--text3);margin-bottom:6px;
}
.stat-value{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;
  color:var(--text);line-height:1.1;
}
.stat-value.text-sm{
  font-size:13px;font-family:'Sora',sans-serif;
  font-weight:600;
}

/* ══════════ CATALYST SECTION ══════════ */
.catalyst-section{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 18px;
  margin-bottom:20px;box-shadow:var(--shadow);
  display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;
}
.catalyst-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  white-space:nowrap;padding-top:4px;flex-shrink:0;
}
.catalyst-tags{display:flex;flex-wrap:wrap;gap:5px}
.cat{
  display:inline-block;padding:4px 10px;border-radius:5px;
  font-size:11px;font-weight:600;
}
.cat.capex{background:var(--blue-bg);color:var(--blue)}
.cat.margin,.cat.margin_expansion{background:var(--green-pale);color:var(--green)}
.cat.geo,.cat.geographic_expansion{background:var(--gold-bg);color:var(--gold)}
.cat.new-prod,.cat.new_products{background:var(--purple-bg);color:var(--purple)}
.cat.acq,.cat.acquisitions{background:var(--red-bg);color:var(--red)}
.cat.operating_leverage{background:var(--gold-bg);color:var(--gold)}
.cat.risk{background:var(--red-bg);color:var(--red)}
.cat.expansion{background:var(--purple-bg);color:var(--purple)}
.cat.guidance{background:var(--blue-bg);color:var(--blue)}

/* ══════════ TABS ══════════ */
.tabs-bar{
  display:flex;gap:0;
  border-bottom:2px solid var(--border);
  margin-bottom:20px;
  overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  background:none;border:none;
  padding:10px 18px;font-size:13px;font-weight:600;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-count{
  font-size:10px;color:var(--text3);
  background:var(--bg);border:1px solid var(--border);
  padding:1px 6px;border-radius:10px;
  margin-left:5px;
  font-family:'JetBrains Mono',monospace;
}
.tab-btn.active .tab-count{background:var(--green-pale);color:var(--green);border-color:transparent}

/* ══════════ OVERVIEW TAB ══════════ */
.overview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.overview-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;
  box-shadow:var(--shadow);
}
.card-title{
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:12px;display:flex;align-items:center;gap:7px;
}
.card-title-icon{
  width:22px;height:22px;border-radius:4px;
  background:var(--green-pale);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
}
.overview-text{
  font-size:14px;color:var(--text);line-height:1.7;
}
.overview-cta-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;
}
.btn-tab-link{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:1.5px solid var(--border);
  padding:7px 14px;border-radius:5px;
  font-size:12px;font-weight:600;color:var(--text2);
  transition:all .15s;
}
.btn-tab-link:hover{border-color:var(--green);color:var(--green)}

/* ══════════ TRIGGER CARDS ══════════ */
.trigger-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
  transition:border-color .15s,box-shadow .15s;
}
.trigger-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.trigger-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;gap:10px;flex-wrap:wrap;
}
.trigger-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.conv-row{display:flex;gap:3px;align-items:center}
.conv-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border);border:1px solid var(--border2);
}
.conv-dot.on{background:var(--green);border-color:var(--green)}
.conv-text{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text3);margin-left:4px;
}
.q-chip{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--text3);
  background:var(--bg);border:1px solid var(--border);
  border-radius:4px;padding:2px 7px;
}
.trigger-body{font-size:14px;color:var(--text);line-height:1.7}
.trigger-quote{
  margin-top:12px;padding:12px 16px;
  background:var(--green-mist);border-radius:6px;
  border-left:3px solid var(--green);
}
.trigger-quote p{
  font-size:12px;color:var(--text2);
  line-height:1.65;font-style:italic;
}
.triggers-section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.triggers-count{
  font-size:12px;color:var(--text3);
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:2px 10px;
  font-family:'JetBrains Mono',monospace;
}

/* ══════════ SIGNAL CARDS ══════════ */
.signal-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;
  margin-bottom:10px;box-shadow:var(--shadow);
  transition:border-color .15s;
}
.signal-card:hover{border-color:var(--border2)}
.signal-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:11px;gap:8px;flex-wrap:wrap;
}
.sig-type-chip{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;padding:3px 9px;border-radius:4px;
}
.sig-type-chip.guidance{background:var(--blue-bg);color:var(--blue)}
.sig-type-chip.capex{background:var(--green-pale);color:var(--green)}
.sig-type-chip.margin{background:var(--gold-bg);color:var(--gold)}
.sig-type-chip.expansion{background:var(--purple-bg);color:var(--purple)}
.sig-type-chip.acquisition{background:var(--red-bg);color:var(--red)}
.sig-type-chip.risk{background:var(--red-bg);color:var(--red)}
.signal-right{display:flex;align-items:center;gap:7px}
.conf-dots{
  display:flex;gap:2px;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;
}
.conf-dot.on{color:var(--green)}
.conf-dot.off{color:var(--border2)}
.signal-body{font-size:14px;color:var(--text);line-height:1.7}
.signal-source{
  font-size:11px;color:var(--text3);
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);
}

/* ══════════ CONCALL SNAPSHOT ══════════ */
.snapshot-metrics{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:18px;
}
.metric-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;
  box-shadow:var(--shadow);text-align:center;
}
.metric-label{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--text3);margin-bottom:8px;
}
.metric-val{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:var(--text);
}
.metric-val.up{color:var(--green-light)}
.metric-val.down{color:var(--red)}
.metric-val.stable{color:var(--gold)}
.tone-chip{
  display:inline-block;padding:4px 12px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.tone-chip.positive{background:var(--green-pale);color:var(--green)}
.tone-chip.neutral{background:var(--gold-bg);color:var(--gold)}
.tone-chip.cautious{background:var(--red-bg);color:var(--red)}

.concall-block{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px 22px;
  margin-bottom:12px;box-shadow:var(--shadow);
}
.cb-header{
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:13px;display:flex;align-items:center;gap:7px;
}
.cb-body{font-size:14px;color:var(--text);line-height:1.75}

.key-quotes-wrap{}
.quote-row{
  display:flex;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.quote-row:last-child{border-bottom:none;padding-bottom:0}
.quote-accent{
  width:3px;min-height:32px;
  border-radius:2px;background:var(--green);flex-shrink:0;
}
.quote-text{
  font-family:'Playfair Display',serif;
  font-size:14px;color:var(--text);
  line-height:1.65;font-style:italic;margin-bottom:5px;
}
.quote-attr{font-size:11px;color:var(--text3)}

/* ══════════ EMPTY / LOADING / PAYWALL ══════════ */
.empty-state{
  text-align:center;padding:60px 20px;
}
.empty-state .icon{font-size:32px;opacity:.3;margin-bottom:12px;display:block}
.empty-state p{font-size:14px;color:var(--text3)}
.loading-wrap{
  display:flex;align-items:center;justify-content:center;
  padding:80px 20px;
}
.spinner{
  width:22px;height:22px;
  border:2.5px solid var(--border);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .65s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.paywall-wrap{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:56px 32px;
  text-align:center;margin:32px 0;
  box-shadow:var(--shadow-md);
}
.paywall-icon{font-size:40px;margin-bottom:16px;display:block}
.paywall-title{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  margin-bottom:8px;letter-spacing:-0.3px;
}
.paywall-desc{
  font-size:14px;color:var(--text3);
  margin-bottom:24px;max-width:360px;
  margin-left:auto;margin-right:auto;line-height:1.65;
}
.paywall-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  background:var(--green);color:#fff;border:none;
  padding:10px 24px;border-radius:6px;
  font-size:13px;font-weight:600;
  font-family:'Sora',sans-serif;cursor:pointer;
  transition:opacity .15s;
}
.btn-primary:hover{opacity:.88}
.btn-outline{
  background:none;border:1.5px solid var(--border2);
  padding:9px 20px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--text2);
  font-family:'Sora',sans-serif;cursor:pointer;
  transition:all .15s;
}
.btn-outline:hover{border-color:var(--green);color:var(--green)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:20px;
  background:var(--text);color:#fff;
  padding:11px 18px;border-radius:7px;
  font-size:13px;font-weight:500;z-index:9999;
  transform:translateY(16px);opacity:0;
  transition:all .25s;pointer-events:none;
  box-shadow:var(--shadow-md);
  max-width:calc(100vw - 40px);
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

/* ══════════ RESPONSIVE ══════════ */
@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr}
  .snapshot-metrics{grid-template-columns:1fr 1fr}
  .overview-grid{grid-template-columns:1fr}
  .co-header-top{flex-direction:column}
  .co-score-block{align-items:flex-start;flex-direction:row;gap:14px}
  .score-label{text-align:left}
  .score-pips{justify-content:flex-start}
  nav{padding:0 14px}
  .page-wrap{padding:16px 14px 60px}
  .tab-btn{padding:8px 12px;font-size:12px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr}
  .snapshot-metrics{grid-template-columns:1fr 1fr}
  .co-name{font-size:26px}
  .nav-breadcrumb{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" onclick="goHome()" href="javascript:void(0)">
    <div class="nav-logo-mark">13</div>
    <div class="nav-logo-text">13X <em>Investments</em></div>
  </a>
  <div class="nav-sep"></div>
  <button class="nav-back" onclick="goBack()">← Screener</button>

<script>
const API_BASE = 'https://one3x-backend.onrender.com/api/v1';

// ── State ──
let currentUser = null, currentSub = null, isPaid = false;
let companyData = null, watchlisted = false;

// ── Auth ──
const getToken        = () => localStorage.getItem('13x_token');
const getRefreshToken = () => localStorage.getItem('13x_refresh_token');
const setToken        = t  => localStorage.setItem('13x_token', t);
const setRefreshToken = t  => localStorage.setItem('13x_refresh_token', t);
const removeToken     = () => localStorage.removeItem('13x_token');
const removeRefreshToken = () => localStorage.removeItem('13x_refresh_token');

let _refreshing = false;
async function tryRefreshToken() {
  if (_refreshing) return false;
  const rt = getRefreshToken();
  if (!rt) return false;
  _refreshing = true;
  try {
    const res  = await fetch(API_BASE + '/auth/refresh', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:rt})});
    const data = await res.json();
    if (!res.ok) throw new Error();
    setToken(data.accessToken);
    if (data.refreshToken) setRefreshToken(data.refreshToken);
    return true;
  } catch { return false; }
  finally { _refreshing = false; }
}

async function apiFetch(path, options={}, _retry=true) {
  const token = getToken();
  const headers = {'Content-Type':'application/json',...(options.headers||{})};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, {...options, headers});
  if (res.status === 401 && _retry) {
    const ok = await tryRefreshToken();
    if (ok) return apiFetch(path, options, false);
    removeToken(); removeRefreshToken();
    window.location.href = '/';
    throw new Error('Session expired');
  }
  let data; try { data = await res.json(); } catch { data = {}; }
  if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
  return data;
}

// ── Utils ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function goHome(){ window.location.href = '/'; }
function goBack(){
  if (document.referrer && document.referrer.includes(location.hostname)) history.back();
  else window.location.href = '/';
}
function getTickerFromURL(){
  const p = window.location.pathname.split('/').filter(Boolean);
  return p[p.length-1] || null;
}

var _toastTimer;
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.className='toast', 3000);
}

// ── Nav render ──
function renderNav(){
  const area = document.getElementById('nav-user-area');
  if (!area) return;
  if (!currentUser){ area.innerHTML=''; return; }
  const pl = isPaid ? (currentSub?.plan==='yearly'?'Pro Yearly':currentSub?.plan==='trial'?'Trial':'Pro') : 'Free';
  area.innerHTML = `<span class="nav-user">${esc(currentUser.name.split(' ')[0])}</span><span class="nav-badge ${isPaid?'':'free'}">${esc(pl)}</span>`;
}

// ── Tab switching ──
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = p.id==='panel-'+tab ? '' : 'none');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Watchlist ──
async function toggleWatchlist(){
  if (!companyData) return;
  const btn = document.getElementById('btn-watch');
  if (!btn) return;
  btn.disabled = true;
  try {
    if (watchlisted){
      await apiFetch('/data/watchlist/'+companyData.id,{method:'DELETE'});
      watchlisted = false;
      btn.innerHTML = '☆ Add to Watchlist';
      btn.classList.remove('active');
      showToast('Removed from watchlist');
    } else {
      await apiFetch('/data/watchlist/'+companyData.id,{method:'POST'});
      watchlisted = true;
      btn.innerHTML = '⭐ Watchlisted';
      btn.classList.add('active');
      showToast('Added to watchlist','success');
    }
  } catch(err){ showToast(err.message||'Failed','error'); }
  finally { btn.disabled = false; }
}

// ── Helpers ──
const TAG_LABELS = {
  'capex':'Capex','margin_expansion':'Margin Expansion','margin':'Margin Expansion',
  'geographic_expansion':'Geo Expansion','geo':'Geo Expansion',
  'new_products':'New Products','new-prod':'New Products',
  'acquisitions':'Acquisition','acq':'Acquisition',
  'operating_leverage':'Op Leverage',
  'risk':'Risk','guidance':'Guidance','expansion':'Expansion',
};

function catLabel(t){
  const key=(t||'').toLowerCase().trim().replace(/["\[\]]/g,'');
  return TAG_LABELS[key] || key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

function catKey(t){ return (t||'').toLowerCase().trim().replace(/["\[\]]/g,''); }

function stageLabel(s){
  return {early_growth:'Early Growth',acceleration:'Acceleration',maturity:'Maturity',decline:'Decline'}[s]||s;
}

function trendCls(v){
  if(!v) return '';
  const u=v.toLowerCase();
  if(['up','improving','growing','expansion'].some(x=>u.includes(x))) return 'up';
  if(['down','declining','falling','contraction'].some(x=>u.includes(x))) return 'down';
  return 'stable';
}
function trendIcon(v){
  const c=trendCls(v);
  return c==='up'?'↑':c==='down'?'↓':'→';
}

function scorePipsHTML(n, total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<div class="pip ${i<=n?'on':''}"></div>`;
  return `<div class="score-pips">${h}</div>`;
}

function convDotsHTML(n, total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<div class="conv-dot ${i<=n?'on':''}"></div>`;
  return `<div class="conv-row">${h}<span class="conv-text">${n}/${total}</span></div>`;
}

function confDotsHTML(n, total=5){
  let h='';
  for(let i=1;i<=total;i++) h+=`<span class="conf-dot ${i<=n?'on':'off'}">●</span>`;
  return `<div class="conf-dots">${h}</div>`;
}

function normTags(tags){
  if(typeof tags==='string'){try{tags=JSON.parse(tags);}catch{tags=tags.split(',');}}
  if(!Array.isArray(tags)) return [];
  return tags.map(t=>{
    const raw=(t||'').toString().trim().toLowerCase().replace(/^"|"$/g,'').replace(/\[|\]/g,'');
    return raw;
  }).filter(t=>t.length>0);
}

function buildConcall(snapshot){

    <div class="empty-state">
      <span class="icon">📋</span>
      <p>No concall snapshot available for this company yet.</p>
    </div>`;

  const toneC = (snapshot.tone||'neutral').toLowerCase();
  const revCls = trendCls(snapshot.revenue_trend);
  const marCls = trendCls(snapshot.margin_trend);

  let html = `
    <div class="snapshot-metrics">
      <div class="metric-card">
        <div class="metric-label">Revenue</div>
        <div class="metric-val ${revCls}">${trendIcon(snapshot.revenue_trend)} ${esc(snapshot.revenue_trend||'—')}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Margins</div>
        <div class="metric-val ${marCls}">${trendIcon(snapshot.margin_trend)} ${esc(snapshot.margin_trend||'—')}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Mgmt Tone</div>
        <span class="tone-chip ${toneC}">${esc(snapshot.tone||'Neutral')}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">Quarter</div>
        <div class="metric-val" style="font-size:15px;font-family:'JetBrains Mono',monospace">${esc(snapshot.quarter||'—')}</div>
      </div>
    </div>`;

  if(snapshot.guidance_summary){
    html+=`<div class="concall-block">
      <div class="cb-header">🎯 Management Guidance</div>
      <div class="cb-body">${esc(snapshot.guidance_summary)}</div>
    </div>`;
  }
  if(snapshot.capex_commentary){
    html+=`<div class="concall-block">
      <div class="cb-header">🏗️ Capex Commentary</div>
      <div class="cb-body">${esc(snapshot.capex_commentary)}</div>
    </div>`;
  }
  if(snapshot.risks){
    html+=`<div class="concall-block">
      <div class="cb-header">⚠️ Risks Highlighted</div>
      <div class="cb-body">${esc(snapshot.risks)}</div>
    </div>`;
  }
  if(snapshot.key_quotes&&snapshot.key_quotes.length){
    const quotesHTML = snapshot.key_quotes.map(q=>`
      <div class="quote-row">
        <div class="quote-accent"></div>
        <div>
          <div class="quote-text">"${esc(q.text)}"</div>
          ${(q.speaker||q.quarter)?`<div class="quote-attr">${[q.speaker,q.quarter].filter(Boolean).map(esc).join(' · ')}</div>`:''}
        </div>
      </div>`).join('');
    html+=`<div class="concall-block">
      <div class="cb-header">📞 Key Management Quotes</div>
      <div class="key-quotes-wrap">${quotesHTML}</div>
    </div>`;
  }
  return html;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init(){
  const ticker = getTickerFromURL();
  if(!ticker || ticker==='company'){ renderError('Company not found.'); return; }

  // Load user state
  const token = getToken();
  if(token){
    try{
      const me = await apiFetch('/auth/me');
      currentUser = me.user; currentSub = me.subscription; isPaid = me.isPaid;
    } catch {}
  }
  renderNav();

  if(!isPaid){ renderPaywall(); return; }

  try{
    const [coRes, triggersRes, signalsRes, snapshotRes, watchlistRes] = await Promise.allSettled([
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/triggers'),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/signals'),
      apiFetch('/data/companies/by-ticker/'+encodeURIComponent(ticker)+'/snapshot'),
      apiFetch('/data/watchlist'),
    ]);

    if(coRes.status==='rejected'){ renderError('Company not found: '+ticker); return; }

    companyData = coRes.value.data;
    if(!companyData){ renderError('Company not found: '+ticker); return; }

    const triggers = triggersRes.status==='fulfilled' ? (triggersRes.value.data||[]) : [];
    const signals  = signalsRes.status ==='fulfilled' ? (signalsRes.value.data ||[]) : [];
    const snapshot = snapshotRes.status==='fulfilled' ? snapshotRes.value.data   : null;

    if(watchlistRes.status==='fulfilled'){
      const wids = new Set((watchlistRes.value.data||[]).map(c=>c.id));
      watchlisted = wids.has(companyData.id);
    }

    renderPage(companyData, triggers, signals, snapshot, watchlisted);
  } catch(err){
    renderError(err.message||'Failed to load company.');
  }
}

init();
</script>
</body>
</html>
